name: Release to Maven Central

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: liberica

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Import GPG key
        env:
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSWORD }}
        run: |
          # write key to a file, import, configure gpg for non-interactive use
          printf '%b' "$GPG_KEY" | gpg --batch --import --passphrase "$GPG_PASSPHRASE"
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          gpgconf --reload gpg-agent
          
          echo "=== Keys in keyring ==="
          gpg --list-secret-keys

      - name: Publish to Maven Central
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSWORD }}
        run: |
          ./gradlew :core:publishToMavenCentral \
            -Pversion=${{ github.ref_name }} \
            -Psigning.gnupg.executable=gpg \
            -Psigning.gnupg.keyName="$GPG_KEY_ID" \
            -Psigning.gnupg.passphrase="$GPG_PASSPHRASE" \
            -Psigning.gnupg.useLegacyGpg=false \
            -PmavenCentralUsername=${{ secrets.MAVEN_CENTRAL_USERNAME }} \
            -PmavenCentralPassword=${{ secrets.MAVEN_CENTRAL_PASSWORD }}
