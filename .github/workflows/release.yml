name: Release to Maven Central

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: liberica

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check secrets
        run: |
          echo "=== Проверка secrets ==="
          
          if [ -z "${{ secrets.MAVEN_CENTRAL_USERNAME }}" ]; then
            echo "MAVEN_CENTRAL_USERNAME: пустой ❌"
          else
            LEN="${{ secrets.MAVEN_CENTRAL_USERNAME }}" && echo "MAVEN_CENTRAL_USERNAME: OK (длина ${#LEN})"
          fi
          
          if [ -z "${{ secrets.MAVEN_CENTRAL_PASSWORD }}" ]; then
            echo "MAVEN_CENTRAL_PASSWORD: пустой ❌"
          else
            LEN="${{ secrets.MAVEN_CENTRAL_PASSWORD }}" && echo "MAVEN_CENTRAL_PASSWORD: OK (длина ${#LEN})"
          fi
          
          if [ -z "${{ secrets.GPG_KEY_ID }}" ]; then
            echo "GPG_KEY_ID: пустой ❌"
          else
            echo "GPG_KEY_ID: OK (длина ${#GPG_KEY_ID})"
          fi
          
          if [ -z "${{ secrets.GPG_PRIVATE_KEY }}" ]; then
            echo "GPG_PRIVATE_KEY: пустой ❌"
          else
            HEADER="${GPG_PRIVATE_KEY:0:30}"
            echo "GPG_PRIVATE_KEY: OK (длина ${#GPG_PRIVATE_KEY}, начинается с: $HEADER...)"
          fi
          
          if [ -z "${{ secrets.GPG_PASSWORD }}" ]; then
            echo "GPG_PASSWORD: пустой ❌"
          else
            LEN="${{ secrets.GPG_PASSWORD }}" && echo "GPG_PASSWORD: OK (длина ${#LEN})"
          fi
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}

      - name: Publish to Maven Central
        env:
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSWORD }}
        run: |
          # Импортируем GPG ключ
          printf '%b' "$GPG_KEY" | gpg --batch --import --passphrase "$GPG_PASSPHRASE" 2>&1
          echo "GPG keys imported:"
          gpg --list-keys --keyid-format LONG 2>&1 || true
          gpg --list-secret-keys --keyid-format LONG 2>&1 || true
          
          # Экспортируем в keyring для Gradle (без фильтрации)
          echo "Exporting secret keys..."
          gpg --batch --yes --export-secret-keys -a > /tmp/secring.gpg 2>&1; EXITCODE=$?
          echo "gpg export exit code: $EXITCODE"
          if [ $EXITCODE -ne 0 ]; then
            echo "gpg export failed, checking keybox..."
            gpgconf --kill gpg-agent 2>&1 || true
            gpg --batch --yes --export-secret-keys -a > /tmp/secring.gpg 2>&1 || true
          fi
          if [ -s /tmp/secring.gpg ]; then
            echo "secring.gpg created, size: $(wc -c < /tmp/secring.gpg) bytes"
            head -3 /tmp/secring.gpg
          else
            echo "ERROR: secring.gpg is empty or missing"
            exit 2
          fi
          
          ./gradlew :core:publishToMavenCentral \
            -Pversion=${{ github.ref_name }} \
            -Psigning.keyId=$GPG_KEY_ID \
            -Psigning.password="$GPG_PASSPHRASE" \
            -Psigning.secretKeyRingFile=/tmp/secring.gpg \
            -PmavenCentralUsername=${{ secrets.MAVEN_CENTRAL_USERNAME }} \
            -PmavenCentralPassword=${{ secrets.MAVEN_CENTRAL_PASSWORD }}
